name: PBSA Weekly Market Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 1"

permissions:
  contents: read

jobs:
  weekly-market-summary:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run weekly Southampton market summary email
        env:
          SMTP_HOST: smtp.office365.com
          SMTP_PORT: "587"
          SMTP_FROM: PBSA-Market-Intelligence@unilife.uk
          SMTP_TO: lewis@unilife.co.uk
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/weekly_market_summary.py
